server:
  port: 8080

management:
  endpoints.web.exposure.include: health,metrics
  endpoint.health.probes.enabled: true
  # Gate the readiness probe on the Camel route state. Default Spring readiness flips to ACCEPTING_TRAFFIC
  # at ApplicationReadyEvent — but our Camel routes don't start until ProcessingStarter receives AcsHealthy,
  # so the probe would falsely report UP for the few seconds (or longer if ACS is slow to come up) between
  # Spring boot complete and routes started. Adding camelRoutes to the readiness group means /health/readiness
  # is UP only when every registered Camel route has transitioned to Started — i.e. the connector is actually
  # consuming JMS events. Liveness keeps the default contributors and continues to track process liveness.
  endpoint.health.group.readiness.include: readinessState,camelRoutes
  health.liveness-state.enabled: true
  health.readiness-state.enabled: true
camel:
  springboot.main-run-controller: true
  dataformat.jackson.autoDiscoverObjectMapper: true
  main.auto-startup: false
  component:
    # Make the JMS consumer's session transactional and bind it to Spring's JmsTransactionManager.
    # Without this, .transacted() on a route only rolls back the Spring TX template; the JMS message
    # itself is auto-acked the moment Camel hands it to the route, so any unhandled exception
    # silently loses the message instead of triggering broker redelivery and eventual DLQ landing.
    activemq:
      transacted: true
      transaction-manager: "#jmsTransactionManager"

application:
  source-id: a1f3e7c0-d193-7023-ce1d-0a63de491876
  version: "@project.version@"

alfresco:
  repository:
    events-endpoint: activemq:topic:alfresco.repo.event2
    events-subscription:
      durable: true
      name: LiveIngesterSubscription
      dead-letter-unsupported-types: true
      observe-content-drops: false
    base-url: http://localhost:8080/alfresco
    response-timeout-ms: 30000
    discovery-endpoint: ${alfresco.repository.base-url}/api/discovery
    health-probe:
      endpoint: ${alfresco.repository.base-url}
      timeout-seconds: 1800
      interval-seconds: 30
  bulk-ingester:
    endpoint: activemq:queue:bulk-ingester-events
    observe-content-drops: false
  transform:
    request:
      endpoint: activemq:queue:acs-repo-transform-request?jmsMessageType=Text
      timeout: 20000
      options:
        "[image/png]":
          resizeWidth: 3840
          resizeHeight: 3840
          allowEnlargement: false
        "[image/jpeg]":
          resizeWidth: 3840
          resizeHeight: 3840
          allowEnlargement: false
    response:
      queue-name: org.alfresco.hxinsight-connector.transform.response
      endpoint: activemq:queue:${alfresco.transform.response.queue-name}
      retry-ingestion:
        attempts: 6
      dead-letter-enabled: true
      dead-letter-uri: activemq:queue:ActiveMQ.DLQ
      maximum-redeliveries: 6
      redelivery-delay-ms: 1000
      throw-failed-transforms: true
    shared-file-store:
      base-url: http://localhost:8099
      file-endpoint: ${alfresco.transform.shared-file-store.base-url}/alfresco/api/-default-/private/sfs/versions/1/file
  filter:
    aspect:
      allow:
      deny:
    type:
      allow:
      deny:
    path:
      allow:
      deny:
hyland-experience:
  insight:
    ingestion:
      base-url: http://localhost:8001
  storage:
    digest-algorithm: SHA-256
    location:
      endpoint: ${hyland-experience.insight.ingestion.base-url}/presigned-urls?httpMethod=POST&throwExceptionOnFailure=false
      response-timeout-ms: 30000
    upload:
      response-timeout-ms: 30000
  ingester:
    endpoint: ${hyland-experience.insight.ingestion.base-url}/ingestion-events?httpMethod=POST&throwExceptionOnFailure=false
    response-timeout-ms: 30000

auth:
  providers:
    hyland-experience:
      type: oauth2
      client-id:
      client-secret:
      token-uri: http://localhost:8001/token
      grant-type: client_credentials
      scope:
        - hxp.integrations
      environment-key: hxi-env-key
      client-name: acs-insight-connector
    alfresco:
      type: basic
      username:
      password:
  retry:
    attempts: 10
    initial-delay: 500
    delay-multiplier: 2
