services:
  alfresco:
    image: quay.io/alfresco/alfresco-content-repository-hxinsight-extension:latest
    deploy:
      resources:
        limits:
          memory: 1700m
    depends_on:
      - postgres
      - activemq
      - transform-router
    environment:
      CATALINA_OPTS: "-agentlib:jdwp=transport=dt_socket,address=*:8000,server=y,suspend=n"
      JAVA_TOOL_OPTIONS: "
        -Drepo.event2.filter.nodeTypes=\"sys:*,fm:*,cm:thumbnail,cm:failedThumbnail,cm:rating,rma:rmsite include_subtypes\"
        -Dencryption.keystore.type=JCEKS
        -Dencryption.cipherAlgorithm=DESede/CBC/PKCS5Padding
        -Dencryption.keyAlgorithm=DESede
        -Dencryption.keystore.location=/usr/local/tomcat/shared/classes/alfresco/extension/keystore/keystore
        -Dmetadata-keystore.password=mp6yc0UD9e
        -Dmetadata-keystore.aliases=metadata
        -Dmetadata-keystore.metadata.password=oKIWzVdEdA
        -Dmetadata-keystore.metadata.algorithm=DESede
        "
      JAVA_OPTS: "
        -Ddb.driver=org.postgresql.Driver
        -Ddb.username=alfresco
        -Ddb.password=alfresco
        -Ddb.url=jdbc:postgresql://postgres:5432/alfresco
        -Dindex.subsystem.name=elasticsearch
        -Delasticsearch.host=elasticsearch
        -Delasticsearch.createIndexIfNotExists=true
        -Delasticsearch.indexName=alfresco
        -Dshare.host=localhost
        -Dshare.port=8080
        -Dalfresco.host=localhost
        -Dalfresco.port=8080
        -Daos.baseUrlOverwrite=http://localhost:8080/alfresco/aos
        -Dmessaging.broker.url=\"failover:(nio://activemq:61616)?timeout=3000&jms.useCompression=true\"
        -Ddeployment.method=DOCKER_COMPOSE
        -Dtransform.service.enabled=true
        -Dtransform.service.url=http://transform-router:8095
        -Dsfs.url=http://shared-file-store:8099
        -DlocalTransform.core-aio.url=http://transform-core-aio:8090
        -Dalfresco-pdf-renderer.url=http://transform-core-aio:8090
        -Djodconverter.url=http://transform-core-aio:8090
        -Dimg.url=http://transform-core-aio:8090
        -Dtika.url=http://transform-core-aio:8090
        -Dtransform.misc.url=http://transform-core-aio:8090
        -Dcsrf.filter.enabled=false
        -Dalfresco.restApi.basicAuthScheme=true
        -Dhxi.discovery.base-url=https://discovery.dev.experience.hyland.com
        -Dhxi.knowledge-retrieval.url=https://hxai-acbf65ce-59b7-4def-b36f-a7dd47f30402.insight.dev.hyland.com/discovery/agents
        -Dhxi.auth.providers.hyland-experience.token-uri=https://auth.iam.dev.experience.hyland.com/idp/connect/token
        -Dhxi.auth.providers.hyland-experience.grant-type=client_credentials   
        -Dhxi.auth.providers.hyland-experience.client-id=sc-91075e1c-be49-4668-87c1-ee9202c42ea5
        -Dhxi.auth.providers.hyland-experience.client-secret=[client_secret]
        -Dhxi.auth.providers.hyland-experience.environment-key=hxai-acbf65ce-59b7-4def-b36f-a7dd47f30402
        -Dhxi.connector.source-id=aaca2d59-e43f-47dc-a089-852245390852
        -Xms1500m -Xmx1500m
        "
    ports:
      - "8000:8000"
    healthcheck:
      test: curl --fail http://localhost:8080/alfresco || exit 1
      start_period: 45s
      interval: 10s
      timeout: 3s
      retries: 30

  postgres:
    image: postgres:14.4
    deploy:
      resources:
        limits:
          memory: 512m
    environment:
      POSTGRES_PASSWORD: alfresco
      POSTGRES_USER: alfresco
      POSTGRES_DB: alfresco
    command: postgres -c max_connections=300 -c log_min_messages=LOG
    ports:
      - "5432:5432"

  activemq:
    image: quay.io/alfresco/alfresco-activemq:5.18-jre17-rockylinux8
    deploy:
      resources:
        limits:
          memory: 1g
    ports:
      - "8161:8161" # Web Console
      - "5672:5672" # AMQP
      - "61616:61616" # OpenWire
      - "61613:61613" # STOMP

  transform-router:
    image: quay.io/alfresco/alfresco-transform-router:latest
    deploy:
      resources:
        limits:
          memory: 512m
    depends_on:
      transform-core-aio:
        condition: service_healthy
    environment:
      JAVA_OPTS: " -Xms256m -Xmx512m"
      ACTIVEMQ_URL: nio://activemq:61616
      CORE_AIO_URL: http://transform-core-aio:8090
      FILE_STORE_URL: http://shared-file-store:8099/alfresco/api/-default-/private/sfs/versions/1/file
      LOGGING_LEVEL_ORG_ALFRESCO_TRANSFORM_ROUTER: TRACE
      LOGGING_LEVEL_ORG_ALFRESCO_TRANSFORM_ROUTER_MESSAGING: INFO
    ports:
      - "8095:8095"
    links:
      - activemq
    healthcheck:
      test: curl --fail http://localhost:8095/ || exit 1
      interval: 5s
      timeout: 3s
      retries: 20

  transform-core-aio:
    image: quay.io/alfresco/alfresco-transform-core-aio:latest
    deploy:
      resources:
        limits:
          memory: 3000m
    environment:
      JAVA_OPTS: " -Xms256m -Xmx3000m"
      ACTIVEMQ_URL: nio://activemq:61616
      FILE_STORE_URL: http://shared-file-store:8099/alfresco/api/-default-/private/sfs/versions/1/file
      LOGGING_LEVEL_ORG_ALFRESCO_TRANSFORM_BASE_TRANSFORM: TRACE
    ports:
      - "8090:8090"
    links:
      - activemq
    healthcheck:
      test: curl --fail http://localhost:8090/ || exit 1
      interval: 5s
      timeout: 3s
      retries: 20

  shared-file-store:
    image: quay.io/alfresco/alfresco-shared-file-store:latest
    deploy:
      resources:
        limits:
          memory: 512m
    environment:
      JAVA_OPTS: " -Xms256m -Xmx512m"
      SCHEDULER_CONTENT_AGE_MILLIS: 86400000
      SCHEDULER_CLEANUP_INTERVAL: 86400000
    ports:
      - "8099:8099"
    volumes:
      - shared-file-store-volume:/tmp/Alfresco/sfs

  share:
    image: quay.io/alfresco/alfresco-share:latest
    deploy:
      resources:
        limits:
          memory: 1024m
    environment:
      REPO_HOST: alfresco
      REPO_PORT: 8080
      JAVA_OPTS: "
        -Dalfresco.host=localhost
        -Dalfresco.port=8080
        -Dalfresco.context=alfresco
        -Dalfresco.protocol=http
        -Xms512m -Xmx512m
        "

  digital-workspace:
    image: quay.io/alfresco/alfresco-digital-workspace:5.3.0
    deploy:
      resources:
        limits:
          memory: 128m
    environment:
      BASE_PATH: ./
      APP_BASE_SHARE_URL: http://localhost:8080/workspace/#/preview/s
      APP_CONFIG_PLUGIN_PROCESS_SERVICE: false
      APP_CONFIG_PROVIDER: ECM
      APP_CONFIG_AUTH_TYPE: BASIC
      APP_CONFIG_PLUGIN_KNOWLEDGE_RETRIEVAL: true

  control-center:
    image: quay.io/alfresco/alfresco-control-center:9.3.0
    deploy:
      resources:
        limits:
          memory: 128m
    environment:
      BASE_PATH: ./
      APP_CONFIG_PLUGIN_PROCESS_SERVICE: false
      APP_CONFIG_PROVIDER: ECM
      APP_CONFIG_AUTH_TYPE: BASIC

  # HTTP proxy to provide HTTP Default port access to services
  proxy:
    image: alfresco/alfresco-acs-nginx:latest
    deploy:
      resources:
        limits:
          memory: 128m
    depends_on:
      - alfresco
      - digital-workspace
      - control-center
      - share
    environment:
      DISABLE_SYNCSERVICE: true
    ports:
      - "8080:8080"
    links:
      - alfresco
      - digital-workspace
      - control-center
      - share

  elasticsearch:
    image: elasticsearch:7.17.26
    deploy:
      resources:
        limits:
          memory: 1700m
    environment:
      - xpack.security.enabled=false
      - discovery.type=single-node
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    cap_add:
      - IPC_LOCK
    #    volumes:
    #      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"

  reindexing:
    image: quay.io/alfresco/alfresco-elasticsearch-reindexing:latest
    deploy:
      resources:
        limits:
          memory: 512m
    depends_on:
      elasticsearch:
        condition: service_started
      alfresco:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: -agentlib:jdwp=transport=dt_socket,address=*:5006,server=y,suspend=n
      SPRING_ELASTICSEARCH_REST_URIS: http://elasticsearch:9200
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/alfresco
      SPRING_ACTIVEMQ_BROKERURL: nio://activemq:61616
      ALFRESCO_REINDEX_BATCH_SIZE: 100
      ALFRESCO_REINDEX_CONCURRENT_PROCESSORS: 4
      ALFRESCO_REINDEX_FROM_ID: 0
      ALFRESCO_REINDEX_TO_ID: 1000
      ALFRESCO_REINDEX_JOB_NAME: reindexByIds
      ELASTICSEARCH_INDEX_NAME: alfresco
      ALFRESCO_REINDEX_PATHINDEXINGENABLED: true
      ALFRESCO_ACCEPTEDCONTENTMEDIATYPESCACHE_BASEURL: http://transform-core-aio:8090/transform/config
    ports:
      - "5006:5006"

  live-indexing:
    image: quay.io/alfresco/alfresco-elasticsearch-live-indexing:latest
    deploy:
      resources:
        limits:
          memory: 512m
    depends_on:
      reindexing:
        condition: service_completed_successfully
    environment:
      JAVA_TOOL_OPTIONS: -agentlib:jdwp=transport=dt_socket,address=*:5005,server=y,suspend=n
      ELASTICSEARCH_INDEXNAME: alfresco
      SPRING_ELASTICSEARCH_REST_URIS: http://elasticsearch:9200
      SPRING_ACTIVEMQ_BROKERURL: nio://activemq:61616
      ALFRESCO_SHAREDFILESTORE_BASEURL: http://shared-file-store:8099/alfresco/api/-default-/private/sfs/versions/1/file
      ALFRESCO_ACCEPTEDCONTENTMEDIATYPESCACHE_BASEURL: http://transform-core-aio:8090/transform/config
    ports:
      - "5005:5005"

